<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>RPS ULTRA</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  height:100vh;
  background: radial-gradient(circle,#000,#020024);
  font-family:sans-serif;
  color:#0ff;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* APP */
#app{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* MENU */
#menu{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:black;
}

.hidden{display:none}

h1{
  font-size:32px;
  text-shadow:0 0 10px #0ff;
}

#count{
  font-size:70px;
  margin:10px;
}

/* HAND */
#hand{
  font-size:110px;
  margin:20px;
  transition:0.5s;
}
.spin{
  transform:rotateY(720deg) scale(1.4);
}

/* BUTTON */
.buttons{
  display:flex;
  gap:10px;
}
button{
  font-size:16px;
  padding:10px 14px;
  border:none;
  border-radius:12px;
  background:#111;
  color:#0ff;
  box-shadow:0 0 10px #0ff;
}

/* PARTICLE */
.particle{
  position:absolute;
  width:6px;
  height:6px;
  background:#0ff;
  border-radius:50%;
  animation:boom 1s linear forwards;
}
@keyframes boom{
  to{
    transform:translate(var(--x),var(--y));
    opacity:0;
  }
}
</style>
</head>

<body>

<div id="menu">
  <h1>⚡ RPS ULTRA ⚡</h1>
  <button onclick="startGame()">▶️ Start</button>
  <button onclick="toggleSound()">🔊 เสียง</button>
</div>

<div id="app" class="hidden">
  <div id="count">3</div>
  <div id="hand">❔</div>

  <div class="buttons">
    <button onclick="pick('rock')">✊</button>
    <button onclick="pick('paper')">✋</button>
    <button onclick="pick('scissors')">✌️</button>
  </div>
</div>

<audio id="beep" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>
<audio id="boom" src="https://actions.google.com/sounds/v1/explosions/explosion.ogg"></audio>

<script>
let choice=null, ready=false, revealed=false;
let soundOn=true;

const menu=document.getElementById("menu");
const app=document.getElementById("app");
const count=document.getElementById("count");
const hand=document.getElementById("hand");

// START
function startGame(){
  menu.classList.add("hidden");
  app.classList.remove("hidden");
  start();
}

function toggleSound(){
  soundOn=!soundOn;
  alert(soundOn?"🔊 เปิดเสียง":"🔇 ปิดเสียง");
}

// LOOP
function start(){
  choice=null;
  ready=false;
  revealed=false;

  let t=3;
  const loop=setInterval(()=>{
    count.innerText=t;
    play("beep");
    t--;

    if(t<0){
      clearInterval(loop);
      count.innerText="GO!";
      ready=true;
    }
  },1000);
}

// PICK
function pick(c){
  if(choice) return;
  choice=c;
}

// SHAKE (เบาๆก็ติด)
let last=0;
window.addEventListener("devicemotion",(e)=>{
  if(!ready || revealed) return;

  const a=e.accelerationIncludingGravity;
  const total=Math.abs(a.x)+Math.abs(a.y)+Math.abs(a.z);
  const now=Date.now();

  if(total>7 && now-last>300){
    last=now;
    reveal();
  }
});

// TAP fallback
document.body.addEventListener("click",()=>{
  if(ready) reveal();
});

// REVEAL
function reveal(){
  if(revealed) return;
  revealed=true;

  hand.innerText = choice ? emoji(choice) : "❌";
  hand.classList.add("spin");

  play("boom");

  // 📳 สั่น
  navigator.vibrate && navigator.vibrate([100,50,100]);

  // 🎆 particle เอฟเฟกต์
  for(let i=0;i<25;i++){
    const p=document.createElement("div");
    p.className="particle";
    p.style.left="50%";
    p.style.top="50%";
    p.style.setProperty("--x",(Math.random()*300-150)+"px");
    p.style.setProperty("--y",(Math.random()*300-150)+"px");
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1000);
  }

  setTimeout(()=>{
    hand.classList.remove("spin");
    start();
  },2500);
}

function emoji(c){
  return c==="rock"?"✊":c==="paper"?"✋":"✌️";
}

function play(id){
  if(!soundOn) return;
  const s=document.getElementById(id);
  s.currentTime=0;
  s.play();
}
</script>

</body>
</html>
