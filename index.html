<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FINAL GOD MODE</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

:root{
--main:#0ff;
--bg:#000;
}

body{
background:radial-gradient(circle at top,#021018,#000);
color:var(--main);
height:100vh;overflow:hidden;
}

/* SCREEN */
.screen{
position:absolute;width:100%;height:100%;
display:none;flex-direction:column;
justify-content:center;align-items:center;
animation:fade .4s;
}
.active{display:flex}

@keyframes fade{
from{opacity:0;transform:scale(.9)}
to{opacity:1;transform:scale(1)}
}

/* BUTTON */
.btn{
margin:10px;padding:18px;
font-size:18px;
border:none;border-radius:20px;
width:80%;max-width:300px;
background:#000;color:var(--main);
box-shadow:0 0 15px var(--main);
}

/* XO BOARD */
#board{
display:grid;
grid-template-columns:repeat(3,90px);
gap:10px;
justify-content:center;
margin-top:20px;
}

.cell{
width:90px;
height:90px;
font-size:35px;
display:flex;
justify-content:center;
align-items:center;
background:#000;
border-radius:15px;
box-shadow:0 0 10px var(--main);
}

/* CARD */
.card{
border:1px solid var(--main);
padding:15px;margin:10px;
border-radius:15px;
width:80%;max-width:300px;
text-align:center;
}

/* PARTICLE */
.p{
position:absolute;width:5px;height:5px;
background:var(--main);
border-radius:50%;
animation:boom .6s forwards;
}
@keyframes boom{
to{transform:translate(var(--x),var(--y));opacity:0}
}

.dev{
position:absolute;bottom:10px;font-size:13px;
}
</style>
</head>

<body>

<!-- MAIN -->
<div id="main" class="screen active">
<h2>FINAL GOD MODE</h2>
<button class="btn" onclick="go('profile',event)">👤 PROFILE</button>
<button class="btn" onclick="go('menu',event)">🎮 PLAY</button>
<button class="btn" onclick="go('shop',event)">💰 SHOP</button>
</div>

<!-- PROFILE -->
<div id="profile" class="screen">
<button class="btn" onclick="go('main',event)">⬅</button>
<h3 id="pname"></h3>
<div id="pmoney"></div>
<div id="plevel"></div>
</div>

<!-- MENU -->
<div id="menu" class="screen">
<button class="btn" onclick="go('main',event)">⬅</button>
<button class="btn" onclick="go('xo',event)">❌⭕ XO</button>
</div>

<!-- XO -->
<div id="xo" class="screen">
<button class="btn" onclick="go('menu',event)">⬅</button>
<div id="board"></div>
<button class="btn" onclick="reset()">🔄 รีแมตช์</button>
</div>

<!-- SHOP -->
<div id="shop" class="screen">
<button class="btn" onclick="go('main',event)">⬅</button>

<div class="card">
<h3>💙 BLUE</h3>
<button class="btn" onclick="buy('blue',50)">ซื้อ 50</button>
<button class="btn" onclick="preview('#00f')">ดู</button>
</div>

<div class="card">
<h3>💚 GREEN</h3>
<button class="btn" onclick="buy('green',80)">ซื้อ 80</button>
<button class="btn" onclick="preview('#0f0')">ดู</button>
</div>

<div class="card">
<h3>💜 PURPLE</h3>
<button class="btn" onclick="buy('purple',120)">ซื้อ 120</button>
<button class="btn" onclick="preview('#f0f')">ดู</button>
</div>

</div>

<div class="dev">พัฒนาโดย meth._15</div>

<script>

/* DATA */
let data=JSON.parse(localStorage.data||"null")||{
name:"PLAYER",
money:100,
xp:0,
skins:["default"],
current:"default"
}

/* SAVE */
function save(){localStorage.data=JSON.stringify(data);update()}

/* UPDATE */
function update(){
pname.innerText="👤 "+data.name
pmoney.innerText="💰 "+data.money
plevel.innerText="Lv."+(Math.floor(data.xp/100)+1)

if(data.current=="blue")setColor("#00f")
if(data.current=="green")setColor("#0f0")
if(data.current=="purple")setColor("#f0f")
}

/* COLOR */
function setColor(c){
document.documentElement.style.setProperty('--main',c)
}

/* NAV */
function go(id,e){
if(e){boom(e.clientX,e.clientY)}
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
update()
}

/* PARTICLE */
function boom(x,y){
for(let i=0;i<20;i++){
let d=document.createElement("div")
d.className="p"
d.style.left = x + "px"
d.style.top = y + "px"
d.style.setProperty('--x',(Math.random()*200-100)+"px")
d.style.setProperty('--y',(Math.random()*200-100)+"px")
document.body.appendChild(d)
setTimeout(()=>d.remove(),600)
}
}

/* SHOP */
function buy(name,price){
if(data.skins.includes(name)){
data.current=name
alert("ใช้สกินแล้ว")
save()
return
}
if(data.money<price)return alert("เงินไม่พอ")

data.money-=price
data.skins.push(name)
data.current=name

alert("ซื้อสำเร็จ!")
save()
}

function preview(c){
setColor(c)
}

/* XO */
let b=["","","","","","","","",""]

function draw(){
board.innerHTML=""
b.forEach((v,i)=>{
let c=document.createElement("div")
c.className="cell"
c.innerText=v

c.onclick=()=>{
if(b[i])return
b[i]="X"

if(win("X")){
alert("ชนะ")
data.money+=20
save()
reset()
return
}

ai()

if(win("O")){
alert("แพ้")
data.money-=10
save()
reset()
return
}

draw()
}

board.appendChild(c)
})
}

function ai(){
let e=b.map((v,i)=>v==""?i:null).filter(v=>v!=null)
b[e[Math.random()*e.length|0]]="O"
}

function win(p){
return [
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
].some(w=>w.every(i=>b[i]==p))
}

function reset(){b=["","","","","","","","",""];draw()}

draw()
update()

</script>

</body>
</html>
