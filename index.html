<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPS</title>
<style>
body{margin:0;background:black;color:white;text-align:center;font-family:sans-serif}
button{font-size:20px;margin:10px;padding:10px}
#hand{font-size:80px;margin:20px}
</style>
</head>
<body>

<h1>เป่ายิงฉุบ</h1>
<div id="count">3</div>
<div id="hand">❔</div>

<button onclick="pick('rock')">✊</button>
<button onclick="pick('paper')">✋</button>
<button onclick="pick('scissors')">✌️</button>

<script>
let choice=null;
let ready=false;

function start(){
  let t=3;
  const loop=setInterval(()=>{
    document.getElementById("count").innerText=t;
    t--;
    if(t<0){
      clearInterval(loop);
      ready=true;
    }
  },1000);
}
start();

function pick(c){
  if(!ready)return;
  choice=c;
  document.getElementById("hand").innerText =
    c==="rock"?"✊":c==="paper"?"✋":"✌️";
}
</script>

</body>
</html>
