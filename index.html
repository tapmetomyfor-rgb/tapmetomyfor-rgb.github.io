<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPS ULTRA</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{
  height:100vh;
  background:radial-gradient(circle at center,#021,#000);
  color:#0ff;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* หน้า */
.screen{
  position:absolute;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.active{display:flex}

/* ปุ่ม */
.btn{
  margin:10px;
  padding:12px 25px;
  border-radius:20px;
  border:none;
  font-size:18px;
  color:#0ff;
  background:#111;
  box-shadow:0 0 10px #0ff;
}

/* title */
.title{
  font-size:32px;
  margin-bottom:20px;
  text-shadow:0 0 20px #0ff;
}

/* game */
#count{
  font-size:80px;
  margin-bottom:20px;
}

#result{
  font-size:100px;
}

.choice{
  font-size:30px;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="screen active">
  <div class="title">⚡ RPS ULTRA ⚡</div>
  <button class="btn" onclick="startGame()">▶ Start</button>
  <button class="btn" onclick="openSettings()">⚙ Settings</button>
</div>

<!-- SETTINGS -->
<div id="settings" class="screen">
  <div class="title">⚙ Settings</div>

  <button class="btn" onclick="toggleSound()">🔊 Sound: <span id="soundText">ON</span></button>
  <button class="btn" onclick="toggleVibrate()">📳 Vibrate: <span id="vibText">ON</span></button>
  <button class="btn" onclick="toggleHide()">🕶 Hide: <span id="hideText">OFF</span></button>

  <button class="btn" onclick="backMenu()">⬅ Back</button>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div id="count">3</div>
  <div id="result">❔</div>

  <div>
    <button class="btn choice" onclick="choose('✊')">✊</button>
    <button class="btn choice" onclick="choose('✋')">✋</button>
    <button class="btn choice" onclick="choose('✌')">✌</button>
  </div>
</div>

<script>
let sound=true;
let vibrate=true;
let hide=false;
let playerChoice=null;
let revealed=false;

/* หน้า */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function openSettings(){show("settings")}
function backMenu(){show("menu")}

/* toggle */
function toggleSound(){
  sound=!sound;
  document.getElementById("soundText").innerText=sound?"ON":"OFF";
}

function toggleVibrate(){
  vibrate=!vibrate;
  document.getElementById("vibText").innerText=vibrate?"ON":"OFF";
}

function toggleHide(){
  hide=!hide;
  document.getElementById("hideText").innerText=hide?"ON":"OFF";
}

/* เกม */
function startGame(){
  show("game");
  playerChoice=null;
  revealed=false;
  document.getElementById("result").innerText="❔";
  countdown(3);
}

function countdown(n){
  document.getElementById("count").innerText=n;

  if(vibrate && navigator.vibrate) navigator.vibrate(100);

  if(n>0){
    setTimeout(()=>countdown(n-1),1000);
  }else{
    setTimeout(()=>reveal(),500);
  }
}

function choose(c){
  playerChoice=c;
}

function reveal(){
  if(revealed) return;
  revealed=true;

  let bot=["✊","✋","✌"][Math.floor(Math.random()*3)];

  let result = playerChoice ? playerChoice : "💀";

  document.getElementById("result").innerText = result;

  if(hide){
    document.getElementById("result").style.opacity=0;
    setTimeout(()=>{document.getElementById("result").style.opacity=1},2000);
  }

  if(vibrate && navigator.vibrate) navigator.vibrate([200,100,200]);
}
</script>

</body>
</html>
