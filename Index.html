<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💌</title>

<style>
body { margin:0; font-family:Arial; background:#ffe6f0; }

.full {
    width:100%;
    height:50vh;
    object-fit:cover;
}

.chat-box {
    height:65vh;
    overflow-y:auto;
    padding:10px;
}

.msg {
    padding:10px;
    margin:5px;
    border-radius:10px;
    max-width:70%;
}

.me { background:#ffb3d9; margin-left:auto; }
.ai { background:#fff; }

.input-box {
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
}

input {
    flex:1;
    padding:15px;
    border:none;
}

button {
    padding:15px;
    border:none;
    background:#ff66aa;
    color:white;
}

.credit {
    position:fixed;
    bottom:60px;
    right:10px;
    font-size:12px;
}
</style>
</head>

<body>

<div id="app"></div>
<div class="credit">พัฒนาโดย ig:meth._15</div>

<script>
const name = "ที่รัก 💖";

// ---------- หน้าแรก ----------
function start(){
    app.innerHTML = `
        <h2 style="text-align:center">📩 มีจดหมายถึง ${name}</h2>
        <img src="outside.jpg" class="full">
        <div style="text-align:center">
            <button onclick="openLetter()">เปิดจดหมาย</button>
        </div>
    `;
}

// ---------- เปิด ----------
function openLetter(){
    app.innerHTML = `
        <h2 style="text-align:center">ขอโทษนะ ${name} 💗</h2>
        <img src="inside.jpg" class="full">
        <div style="text-align:center">
            <button onclick="chat()">เริ่มคุย 💬</button>
        </div>
    `;
}

// ---------- แชท ----------
let mood = 0; // 😡 → 😳 → 💖

function chat(){
    document.body.innerHTML = `
        <div class="chat-box" id="chat"></div>

        <div class="input-box">
            <input id="input" placeholder="พิมพ์ง้อ...">
            <button onclick="send()">ส่ง</button>
        </div>

        <div class="credit">พัฒนาโดย ig:meth._15</div>
    `;

    // 🎵 เพลง
    let iframe=document.createElement("iframe");
    iframe.src="https://www.youtube.com/embed/a_idHhd77es?autoplay=1&mute=1";
    iframe.style.display="none";
    document.body.appendChild(iframe);

    addMsg("ยังงอนอยู่นะ 😤", "ai");
}

// ---------- เพิ่มข้อความ ----------
function addMsg(text,cls){
    let div=document.createElement("div");
    div.className="msg "+cls;
    div.innerText=text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// ---------- ส่ง ----------
function send(){
    let text=input.value;
    if(!text) return;

    addMsg(text,"me");
    input.value="";

    setTimeout(()=>{
        let reply = aiReply(text);
        addMsg(reply,"ai");
    },500);
}

// ---------- AI ----------
function aiReply(msg){
    msg = msg.toLowerCase();

    // 💔 งอน
    if(mood === 0){
        if(msg.includes("ขอโทษ") || msg.includes("ง้อ")){
            mood = 1;
            return "ก็...เริ่มดีขึ้นนิดนึง 😒";
        }
        return "ยังไม่หายงอน 😤";
    }

    // 😳 ใจอ่อน
    if(mood === 1){
        if(msg.includes("รัก") || msg.includes("คิดถึง")){
            mood = 2;
            return "ก็...ใจอ่อนแล้วก็ได้ 💕";
        }
        return "ง้ออีกหน่อยสิ 🥺";
    }

    // 💖 ให้อภัย
    if(mood === 2){
        return ["โอเค หายงอนแล้ว 💖","รักเหมือนกันนะ 😳","ยอมแล้วก็ได้ 😆"]
        [Math.floor(Math.random()*3)];
    }

    return "อืม...";
}

// ---------- เริ่ม ----------
start();
</script>

</body>
</html>
