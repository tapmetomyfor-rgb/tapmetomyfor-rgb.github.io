<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULTRA GAME</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{
height:100vh;
background:radial-gradient(circle,#001,#000);
color:#0ff;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* screen */
.screen{
position:absolute;
width:100%;
height:100%;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
}
.active{display:flex}

/* UI */
.title{
font-size:28px;
margin-bottom:20px;
text-shadow:0 0 20px #0ff;
}

.btn{
margin:8px;
padding:12px 20px;
border:none;
border-radius:20px;
background:#111;
color:#0ff;
font-size:16px;
box-shadow:0 0 10px #0ff;
transition:.2s;
}
.btn:active{transform:scale(.9)}

.back{
position:absolute;
top:10px;
left:10px;
}

.money{
position:absolute;
top:10px;
right:10px;
}

/* OX */
.board{
display:grid;
grid-template-columns:repeat(3,80px);
gap:5px;
}
.cell{
width:80px;height:80px;
background:#111;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
}

/* animation */
@keyframes glow{
0%{box-shadow:0 0 5px #0ff}
50%{box-shadow:0 0 20px #0ff}
100%{box-shadow:0 0 5px #0ff}
}
.btn{animation:glow 2s infinite}
</style>
</head>

<body>

<div class="money">💰 <span id="money">100</span></div>

<!-- MENU -->
<div id="menu" class="screen active">
<div class="title">⚡ ULTRA GAME ⚡</div>
<button class="btn" onclick="openGame('rps')">✊ RPS</button>
<button class="btn" onclick="openGame('ox')">❌⭕ OX</button>
<button class="btn" onclick="openGame('dice')">🎲 Dice</button>
<button class="btn" onclick="openGame('slot')">🎰 Slot</button>
</div>

<!-- RPS -->
<div id="rps" class="screen">
<button class="btn back" onclick="back()">⬅</button>
<div class="title">RPS</div>
<div id="rpsResult">?</div>
<button class="btn" onclick="playRPS('✊')">✊</button>
<button class="btn" onclick="playRPS('✋')">✋</button>
<button class="btn" onclick="playRPS('✌')">✌</button>
</div>

<!-- OX -->
<div id="ox" class="screen">
<button class="btn back" onclick="back()">⬅</button>
<div class="title">OX</div>
<div id="board" class="board"></div>
</div>

<!-- Dice -->
<div id="dice" class="screen">
<button class="btn back" onclick="back()">⬅</button>
<div class="title">🎲 Dice</div>
<div id="diceResult">?</div>
<button class="btn" onclick="rollDice()">ทอย</button>
</div>

<!-- Slot -->
<div id="slot" class="screen">
<button class="btn back" onclick="back()">⬅</button>
<div class="title">🎰 Slot</div>
<div id="slotResult">❓❓❓</div>
<button class="btn" onclick="spin()">SPIN</button>
</div>

<script>
let money=100
function updateMoney(){document.getElementById("money").innerText=money}

/* sound */
function beep(){
let ctx=new AudioContext()
let o=ctx.createOscillator()
o.connect(ctx.destination)
o.start()
o.stop(ctx.currentTime+0.1)
}

/* vibrate */
function vib(){navigator.vibrate?.(100)}

/* particles */
function boom(){
for(let i=0;i<20;i++){
let d=document.createElement("div")
d.style.position="absolute"
d.style.width="5px"
d.style.height="5px"
d.style.background="#0ff"
d.style.left=Math.random()*100+"%"
d.style.top=Math.random()*100+"%"
d.style.transition="1s"
document.body.appendChild(d)
setTimeout(()=>d.remove(),1000)
}
}

function openGame(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'))
document.getElementById(id).classList.add('active')
}

function back(){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'))
document.getElementById('menu').classList.add('active')
}

/* RPS */
function playRPS(p){
let arr=['✊','✋','✌']
let ai=arr[Math.floor(Math.random()*3)]
let res="เสมอ"
if(p=='✊'&&ai=='✌'||p=='✋'&&ai=='✊'||p=='✌'&&ai=='✋'){res="ชนะ";money+=10}
else if(p!=ai){res="แพ้";money-=5}
updateMoney()
document.getElementById("rpsResult").innerText=p+" vs "+ai+" = "+res
beep();vib();boom()
}

/* OX */
let board=["","","","","","","","",""]
function draw(){
let el=document.getElementById("board")
el.innerHTML=""
board.forEach((v,i)=>{
let c=document.createElement("div")
c.className="cell"
c.innerText=v
c.onclick=()=>move(i)
el.appendChild(c)
})
}
function move(i){
if(board[i]!="")return
board[i]="X"
aiMove()
draw()
}
function aiMove(){
let empty=board.map((v,i)=>v==""?i:null).filter(v=>v!=null)
if(empty.length==0)return
board[empty[Math.floor(Math.random()*empty.length)]]="O"
}
draw()

/* Dice */
function rollDice(){
let p=Math.ceil(Math.random()*6)
let ai=Math.ceil(Math.random()*6)
let res=p>ai?"ชนะ":p<ai?"แพ้":"เสมอ"
if(res=="ชนะ")money+=10;else if(res=="แพ้")money-=5
updateMoney()
document.getElementById("diceResult").innerText=p+" vs "+ai+" = "+res
beep();vib()
}

/* Slot */
