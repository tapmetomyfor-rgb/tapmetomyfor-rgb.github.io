<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FINAL GOD MODE</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
:root{--main:#0ff}
body{background:#000;color:var(--main);overflow:hidden}

.screen{position:absolute;width:100%;height:100%;display:none;flex-direction:column;justify-content:center;align-items:center}
.active{display:flex}

.btn{
padding:14px;margin:6px;font-size:15px;width:85%;
border:none;border-radius:20px;
background:#000;color:var(--main);
box-shadow:0 0 12px var(--main);
}
.btn:active{transform:scale(.95);box-shadow:0 0 25px var(--main)}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:90%}
#board{display:grid;grid-template-columns:repeat(3,80px);gap:10px}
.cell{width:80px;height:80px;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 0 10px var(--main)}
#slotRes{font-size:45px}

canvas{background:#111;margin-top:10px}

.p{position:absolute;width:6px;height:6px;background:var(--main);border-radius:50%;animation:boom .6s forwards}
@keyframes boom{to{transform:translate(var(--x),var(--y));opacity:0}}
</style>
</head>

<body>

<div id="moneyBox">💰100</div>

<div id="main" class="screen active">
<h2>FINAL GOD MODE</h2>
<button class="btn" onclick="go('menu',event)">🎮 PLAY</button>
<button class="btn" onclick="go('shop',event)">🛒 SHOP</button>
<button class="btn" onclick="go('inv',event)">🎒 INVENTORY</button>
<button class="btn" onclick="go('rank',event)">🏆 RANK</button>
<button class="btn" onclick="daily()">🎁 DAILY +200</button>
</div>

<div id="menu" class="screen">
<button class="btn" onclick="go('main',event)">⬅</button>
<button class="btn" onclick="go('xo',event)">XO</button>
<button class="btn" onclick="go('slot',event)">SLOT</button>
<button class="btn" onclick="go('bomb',event)">BOMB</button>
<button class="btn" onclick="go('memory',event)">MEMORY</button>
<button class="btn" onclick="go('reaction',event)">REACTION</button>
</div>

<!-- XO -->
<div id="xo" class="screen">
<button class="btn" onclick="go('menu',event)">⬅</button>
<button class="btn" onclick="mode='ai'">AI</button>
<button class="btn" onclick="mode='pvp'">👤 เพื่อน</button>
<div id="board"></div>
<button class="btn" onclick="reset()">รีแมตช์</button>
</div>

<!-- SLOT -->
<div id="slot" class="screen">
<button class="btn" onclick="go('menu',event)">⬅</button>
<div id="slotRes">❓❓❓</div>
<button class="btn" onclick="spin()">SPIN (-30)</button>
</div>

<!-- BOMB -->
<div id="bomb" class="screen">
<button class="btn" onclick="go('menu',event)">⬅</button>
<button class="btn" onclick="startBomb()">▶ START</button>
<canvas id="game" width="300" height="400"></canvas>
<div id="hpText"></div>
<div id="timeText"></div>
</div>

<!-- MEMORY -->
<div id="memory" class="screen">
<button class="btn" onclick="go('menu',event)">⬅</button>
<button class="btn" onclick="startMemory()">🔄 รีแมต</button>
<div id="memoryGrid" class="grid"></div>
</div>

<!-- REACTION -->
<div id="reaction" class="screen">
<button class="btn" onclick="go('menu',event)">⬅</button>
<div id="reactionBox" style="width:200px;height:200px;background:red"></div>
<div id="reactionText"></div>
</div>

<!-- SHOP -->
<div id="shop" class="screen">
<button class="btn" onclick="go('main',event)">⬅</button>
<button class="btn" onclick="openBox()">🎁 Lootbox 200</button>
<div id="shopList"></div>
</div>

<!-- INVENTORY -->
<div id="inv" class="screen">
<button class="btn" onclick="go('main',event)">⬅</button>
<div id="invList" class="grid"></div>
</div>

<!-- RANK -->
<div id="rank" class="screen">
<button class="btn" onclick="go('main',event)">⬅</button>
<div id="rankList"></div>
</div>

<script>

/* DATA */
let data=JSON.parse(localStorage.data||"null")||{
money:100,skins:["default"],current:"default",lastDaily:0,best:0
}
function save(){
localStorage.data=JSON.stringify(data)
moneyBox.innerText="💰"+data.money
rankList.innerText="🏆 Best: "+data.best+"s"
}

/* FX */
function boom(x,y){
for(let i=0;i<10;i++){
let d=document.createElement("div")
d.className="p"
d.style.left=x+"px";d.style.top=y+"px"
d.style.setProperty('--x',(Math.random()*200-100)+"px")
d.style.setProperty('--y',(Math.random()*200-100)+"px")
document.body.appendChild(d)
setTimeout(()=>d.remove(),600)
}
if(navigator.vibrate)navigator.vibrate(10)
}

/* NAV */
function go(id,e){
if(e)boom(e.clientX||150,e.clientY||150)
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

/* XO */
let b=["","","","","","","","",""],mode="ai",turn="X"
function draw(){
board.innerHTML=""
b.forEach((v,i)=>{
let c=document.createElement("div")
c.className="cell";c.innerText=v
c.onclick=e=>{
if(b[i])return
boom(e.clientX,e.clientY)
if(mode=="pvp"){b[i]=turn;turn=turn=="X"?"O":"X"}
else{b[i]="X";ai()}
draw()
}
board.appendChild(c)
})
}
function ai(){let e=b.map((v,i)=>v==""?i:null).filter(v=>v!=null);b[e[Math.random()*e.length|0]]="O"}
function reset(){b=["","","","","","","","",""];turn="X";draw()}

/* SLOT */
let spinning=false
function spin(){
if(spinning||data.money<30)return
spinning=true;data.money-=30
let s=["🍒","🍋","⭐","💎","7️⃣"],i=0
let anim=setInterval(()=>{
slotRes.innerText=[s[Math.random()*5|0],s[Math.random()*5|0],s[Math.random()*5|0]].join("")
if(++i>20){clearInterval(anim);finish()}
},60)
}
function finish(){
let s=["🍒","🍋","⭐","💎","7️⃣"]
let r=Math.random()
if(r<0.01){slotRes.innerText="7️⃣7️⃣7️⃣";data.money+=500;explode()}
else if(r<0.4){let x=s[Math.random()*5|0];slotRes.innerText=x+x+x;data.money+=100}
else slotRes.innerText=[s[Math.random()*5|0],s[Math.random()*5|0],s[Math.random()*5|0]].join("")
spinning=false;save()
}
function explode(){for(let i=0;i<40;i++)boom(innerWidth/2,innerHeight/2)}

/* BOMB */
let ctx=game.getContext("2d")
let player,bombs,playing=false,startTime=0

function startBomb(){
player={x:150,y:350,hp:3}
bombs=[]
playing=true
startTime=Date.now()
}

function move(x){
let rect=game.getBoundingClientRect()
player.x=x-rect.left
}

game.addEventListener("mousemove",e=>{if(playing)move(e.clientX)})
game.addEventListener("touchmove",e=>{if(playing){move(e.touches[0].clientX);e.preventDefault()}})

function loop(){
ctx.clearRect(0,0,300,400)

if(playing){

ctx.fillStyle="white"
ctx.beginPath()
ctx.moveTo(player.x,player.y)
ctx.lineTo(player.x-12,player.y+20)
ctx.lineTo(player.x+12,player.y+20)
ctx.fill()

if(Math.random()<0.03)bombs.push({x:Math.random()*280,y:0})

bombs.forEach((b,i)=>{
b.y+=4
ctx.fillStyle="red"
ctx.beginPath()
ctx.arc(b.x,b.y,8,0,6.28)
ctx.fill()

if(Math.abs(b.x-player.x)<15 && Math.abs(b.y-player.y)<20){
bombs.splice(i,1)
player.hp--
if(player.hp<=0){
playing=false
let t=Math.floor((Date.now()-startTime)/1000)
if(t>data.best)data.best=t
save()
alert("รอด "+t+" วินาที")
}
}
})

hpText.innerText="❤️ "+player.hp
timeText.innerText="⏱ "+Math.floor((Date.now()-startTime)/1000)+"s"
}

requestAnimationFrame(loop)
}
loop()

/* MEMORY */
function startMemory(){
memoryGrid.innerHTML=""
let cards=["🍒","🍒","⭐","⭐","💎","💎","🍋","🍋"].sort(()=>Math.random()-0.5)
let first=null,lock=false
cards.forEach(v=>{
let c=document.createElement("div")
c.className="btn";c.innerText="❓"
c.onclick=()=>{
if(lock||c.innerText!="❓")return
c.innerText=v
if(!first){first=c}
else{
lock=true
setTimeout(()=>{
if(first.innerText!=c.innerText){
first.innerText="❓";c.innerText="❓"
}else data.money+=10
first=null;lock=false;save()
},400)
}
}
memoryGrid.appendChild(c)
})
}

/* REACTION */
let startT
reactionBox.onclick=()=>{
if(!startT){
setTimeout(()=>{
reactionBox.style.background="green"
startT=Date.now()
},Math.random()*2000+1000)
}else{
reactionText.innerText=(Date.now()-startT)+" ms"
startT=null
reactionBox.style.background="red"
}
}

/* DAILY */
function daily(){
let now=Date.now()
if(now-data.lastDaily<86400000)return alert("รับแล้ววันนี้")
data.lastDaily=now
data.money+=200
save()
}

/* SHOP */
let skins=[
{name:"default",color:"#0ff"},
{name:"blue",color:"#00f"},
{name:"green",color:"#0f0"},
{name:"purple",color:"#f0f"},
{name:"red",color:"#f00"},
{name:"gold",color:"#ffd700"}
]

function renderShop(){
shopList.innerHTML=skins.map(s=>{
let own=data.skins.includes(s.name)
return `<div class="btn" onclick="buy('${s.name}')">${s.name} ${own?"USE":"50"}</div>`
}).join("")
}

function buy(n){
if(data.skins.includes(n)){data.current=n;apply();save();return}
if(data.money<50)return
data.money-=50
data.skins.push(n)
data.current=n
apply();save()
}

/* INVENTORY */
function renderInv(){
invList.innerHTML=data.skins.map(s=>`<div class="btn" onclick="equip('${s}')">${s}</div>`).join("")
}
function equip(n){data.current=n;apply();save()}
function apply(){
let s=skins.find(x=>x.name==data.current)
if(s)document.documentElement.style.setProperty('--main',s.color)
}

/* LOOTBOX */
function openBox(){
if(data.money<200)return
data.money-=200
let r=skins[Math.random()*skins.length|0]
if(!data.skins.includes(r.name))data.skins.push(r.name)
data.current=r.name
apply();save()
}

/* INIT */
apply();draw();startMemory();renderShop();renderInv();save()

</script>
</body>
</html>
